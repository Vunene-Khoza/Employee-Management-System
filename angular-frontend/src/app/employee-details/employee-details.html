<h3>Employee Details</h3>
<div class="card col-md-6 offset-md-3">
    <div class="card-body">
        <div class="row">
            <label>First Name: </label>
            <div>{{employee.firstName}}</div>
        </div>
        <div class="row">
            <label>Last Name: </label>
            <div>{{employee.lastName}}</div>
        </div>
        <div class="row">
            <label>Email ID: </label>
            <div>{{employee.emailId}}</div>
        </div>
    </div>
</div>
