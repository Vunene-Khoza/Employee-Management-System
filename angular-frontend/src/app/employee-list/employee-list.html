<h2>Employee List</h2>
<table class="table table-bordered table-striped">
    <thead>
        <tr> 
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email ID</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <!-- Show message if no data (very helpful for debugging) -->
        <tr *ngIf="employees.length === 0">
            <td colspan="3" class="text-center">
                No employees found (loading or empty list)
            </td>
        </tr>
        <tr *ngFor="let employee of employees; let i = index">
            <td>{{employee.firstName}}</td>
            <td>{{employee.lastName}}</td>
            <td>{{employee.emailId}}</td>
            <td>
                <button class="btn btn-info" (click)="updateEmployee(employee.id)">Update</button>
                <button class="btn btn-danger" (click)="deleteEmployee(employee.id)" style="margin-left: 10px">Delete</button>
                <button class="btn btn-primary" (click)="viewEmployeeDetails(employee.id)" style="margin-left: 10px">View Details</button>
            </td>        
        </tr>
    </tbody>
</table>
